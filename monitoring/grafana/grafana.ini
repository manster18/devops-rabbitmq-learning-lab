# monitoring/grafana/grafana.ini
# Optional settings layered on top of GF_* environment variables from docker-compose.yml.

[analytics]
reporting_enabled = false
check_for_updates = false

[users]
default_theme = dark
viewers_can_edit = false

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/rabbitmq.json

[log]
mode = console
level = info

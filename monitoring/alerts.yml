# monitoring/alerts.yml
# Alerting rules referenced by monitoring/prometheus.yml (rule_files).
groups:
  - name: rabbitmq
    rules:
      - alert: RabbitMQQueueGrowing
        expr: increase(rabbitmq_queue_messages[5m]) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Queue {{ $labels.queue }} is growing fast"
          description: "Queue {{ $labels.queue }} grew by more than 1000 messages over the last 5 minutes."

      - alert: RabbitMQNoConsumers
        expr: rabbitmq_queue_consumers == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "No consumers for queue {{ $labels.queue }}"
          description: "Queue {{ $labels.queue }} has had zero consumers for at least 2 minutes."

      - alert: RabbitMQDiskLow
        expr: rabbitmq_disk_space_available_bytes < 2e9
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "RabbitMQ node {{ $labels.instance }} is low on disk"
          description: "Available disk space on {{ $labels.instance }} dropped below 2GB."

      - alert: RabbitMQHighMemory
        expr: rabbitmq_process_resident_memory_bytes / rabbitmq_resident_memory_limit_bytes > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ node {{ $labels.instance }} memory usage is high"
          description: "Resident memory usage exceeded 80% of the configured high watermark."

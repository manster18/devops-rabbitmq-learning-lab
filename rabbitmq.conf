# RabbitMQ Configuration — RabbitMQ Learning Lab

# Prometheus plugin
prometheus.return_per_object_metrics = true
prometheus.tcp.port = 15692

# Management plugin
management.tcp.port = 15672

# `management_metrics_collection` (the stats behind the Management UI's
# queue/message graphs and the "Get messages" panel) is deprecated since
# RabbitMQ 4.0 in favor of the Prometheus plugin, but is still fully
# supported ("permitted by default", no confirmed removal version — see
# docs/monitoring.md). `permit = true` is already the current default, so
# this line changes nothing at runtime and does NOT silence the startup
# warning (RabbitMQ logs it whenever a permitted-but-deprecated feature is
# used, regardless of this setting) — it is here purely to pin our intent
# to keep using it, so the lab keeps working unchanged if a future RabbitMQ
# release flips the default to "denied by default".
deprecated_features.permit.management_metrics_collection = true

# Memory limits (default for the lab). Case 7 temporarily lowers this via
# `rabbitmqctl set_vm_memory_high_watermark` — do not leave an absolute
# watermark here permanently: it fights with the relative setting below.
vm_memory_high_watermark.relative = 0.4
vm_memory_high_watermark_paging_ratio = 0.5

# Disk limits
disk_free_limit.absolute = 1GB

# Default vhost / user (also provided via RABBITMQ_DEFAULT_* env vars)
default_vhost = /
default_user = guest
default_pass = guest

# Quorum queues (used in the clustering lab case)
queue_master_locator = min-masters

# Dead Letter Exchange is configured per-queue via `definitions.json`
# (see the `orders` queue arguments) rather than a global setting here.

# Load exchanges/queues/bindings on startup
management.load_definitions = /etc/rabbitmq/definitions.json
